services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: cultbear-app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./:/var/www
      - /var/run/docker.sock:/var/run/docker.sock
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - cultbear

  nginx:
    image: nginx:1.27
    container_name: cultbear-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    environment:
      SSL_DOMAINS: ${SSL_DOMAINS:-cu1tbear.local,cultbear.local}
    depends_on:
      - app
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    networks:
      - cultbear

  certbot:
    image: certbot/certbot
    container_name: cultbear-certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - cultbear

  postgres:
    image: postgres:16-alpine
    container_name: cultbear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cultbear}
      POSTGRES_USER: ${DB_USERNAME:-cultbear}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cultbear_password}
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cultbear} -d ${DB_DATABASE:-cultbear}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cultbear

  redis:
    image: redis:7-alpine
    container_name: cultbear-redis
    restart: unless-stopped
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cultbear

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: cultbear-worker
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./:/var/www
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - cultbear

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: cultbear-scheduler
    restart: unless-stopped
    working_dir: /var/www/backend
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www
      - /var/run/docker.sock:/var/run/docker.sock
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - cultbear

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:

networks:
  cultbear:
    driver: bridge
