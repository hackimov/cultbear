# Локальная среда: HTTP
server {
    listen 80;
    server_name cu1tbear.local cultbear.local;

    client_max_body_size 300M;
    root /var/www/backend/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Локальная среда: HTTPS (самоподписанный сертификат из entrypoint nginx)
server {
    listen 443 ssl;
    server_name cu1tbear.local cultbear.local;

    client_max_body_size 300M;
    root /var/www/backend/public;
    index index.php index.html;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Продакшен: HTTP — ACME и редирект на HTTPS
# Все хосты перечислите в server_name (и дублируйте в backend/.env SSL_DOMAINS через запятую для certbot).
server {
    listen 80;
    server_name cu1tbear.ru www.cu1tbear.ru xn--90aoee1ao8d.xn--p1ai;

    client_max_body_size 300M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

